services:
  - type: web
    name: traineye-ai
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma db push && npx prisma db seed && npm run build
    startCommand: npm start
    healthCheckPath: /map
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        value: file:./prisma/traineye.db
