services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: traineye
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/traineye"
      NEXTAUTH_SECRET: "traineye-secret-change-in-production"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push && npx prisma db seed && node server.js"

volumes:
  pgdata:
